<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- sky background -->
  <rect width="64" height="64" rx="12" fill="#0f1b3d"/>
  <!-- horizon line -->
  <line x1="6" y1="40" x2="58" y2="40" stroke="#3a4f7a" stroke-width="1.5"/>
  <!-- sun glow -->
  <circle cx="32" cy="28" r="16" fill="#ffcc3a" opacity="0.15"/>
  <!-- sun body -->
  <circle cx="32" cy="28" r="9" fill="#ffcc3a"/>
  <!-- sun rays -->
  <g stroke="#ffcc3a" stroke-width="2" stroke-linecap="round">
    <line x1="32" y1="14" x2="32" y2="10"/>
    <line x1="32" y1="42" x2="32" y2="46"/>
    <line x1="18" y1="28" x2="14" y2="28"/>
    <line x1="46" y1="28" x2="50" y2="28"/>
    <line x1="22.1" y1="18.1" x2="19.3" y2="15.3"/>
    <line x1="41.9" y1="37.9" x2="44.7" y2="40.7"/>
    <line x1="22.1" y1="37.9" x2="19.3" y2="40.7"/>
    <line x1="41.9" y1="18.1" x2="44.7" y2="15.3"/>
  </g>
  <!-- ground -->
  <rect x="6" y="40" width="52" height="18" rx="0" fill="#1b253e"/>
  <!-- altitude arc hint -->
  <path d="M 14 40 Q 32 8 50 40" fill="none" stroke="#60a5fa" stroke-width="1.2" stroke-dasharray="3 2" opacity="0.6"/>
</svg>
